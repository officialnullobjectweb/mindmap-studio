name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macOS Apple Silicon
            artifact: mac-apple
          - target: x86_64-apple-darwin
            name: macOS Intel
            artifact: mac-intel
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build Tauri
        run: npx tauri build --target ${{ matrix.target }}
      - name: Ad-hoc sign the app
        run: |
          APP_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" -type d | head -1)
          if [ -n "$APP_PATH" ]; then
            echo "Signing: $APP_PATH"
            codesign --force --deep --sign - "$APP_PATH"
            echo "Signed successfully"
          fi
      - name: Sign the DMG
        run: |
          DMG_PATH=$(find src-tauri/target/${{ matrix.target }}/release/bundle/dmg -name "*.dmg" | head -1)
          if [ -n "$DMG_PATH" ]; then
            echo "Signing DMG: $DMG_PATH"
            codesign --force --sign - "$DMG_PATH"
            echo "DMG signed"
          fi
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Tauri
        run: npx tauri build
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          compression-level: 0

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Tauri
        run: npx tauri build
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          compression-level: 0
      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error
          compression-level: 0

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f -exec ls -lh {} \;

      - name: Flatten artifacts for release
        run: |
          mkdir -p release-files
          find artifacts -type f -name "*.dmg" -exec cp {} release-files/ \;
          find artifacts -type f -name "*.exe" -exec cp {} release-files/ \;
          find artifacts -type f -name "*.AppImage" -exec cp {} release-files/ \;
          find artifacts -type f -name "*.deb" -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -lh release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MindMap Studio ${{ github.ref_name }}"
          body: |
            ## MindMap Studio ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `mindmap-studio-aarch64.dmg` |
            | macOS (Intel) | `mindmap-studio-x64.dmg` |
            | Windows | `mindmap-studio-windows.exe` |
            | Linux (AppImage) | `mindmap-studio-linux.AppImage` |
            | Linux (Debian) | `mindmap-studio-linux.deb` |

            ### What's New
            - Professional visual mind mapping tool
            - Markdown & JSON import
            - Export: HTML, SVG, PNG, JPG, PDF, JSON
            - Dark/Light theme with color wheel
            - 15+ shape types with drag & drop
            - Keyboard shortcuts
            - Collapse/expand nodes
          files: release-files/*
          draft: false
          prerelease: false
