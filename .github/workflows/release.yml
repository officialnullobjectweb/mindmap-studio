name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            name: macOS Apple Silicon
            artifact: mindmap-studio-aarch64.dmg
          - target: x86_64-apple-darwin
            name: macOS Intel
            artifact: mindmap-studio-x64.dmg
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build Tauri
        run: npx tauri build --target ${{ matrix.target }}
      - name: List DMG
        run: ls -la src-tauri/target/${{ matrix.target }}/release/bundle/dmg/
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Tauri
        run: npx tauri build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mindmap-studio-windows.exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libfuse2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build Tauri
        run: npx tauri build
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mindmap-studio-linux
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: List artifacts
        run: find artifacts -type f | head -20
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "MindMap Studio ${{ github.ref_name }}"
          body: |
            ## MindMap Studio ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS (Apple Silicon) | `mindmap-studio-aarch64.dmg` |
            | macOS (Intel) | `mindmap-studio-x64.dmg` |
            | Windows | `mindmap-studio-windows.exe` |
            | Linux (AppImage) | `mindmap-studio-linux.AppImage` |
            | Linux (Debian) | `mindmap-studio-linux.deb` |

            ### What's New
            - Professional visual mind mapping tool
            - Markdown & JSON import
            - Export: HTML, SVG, PNG, JPG, PDF, JSON
            - Dark/Light theme
            - Keyboard shortcuts
            - Collapse/expand nodes
            - Color wheel with HSL picker
            - 15+ shape types
          files: artifacts/*
          draft: false
          prerelease: false
